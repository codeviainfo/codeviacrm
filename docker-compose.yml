services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codevia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codevia}
      POSTGRES_DB: ${POSTGRES_DB:-codevia_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codevia} -d ${POSTGRES_DB:-codevia_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-codevia}:${POSTGRES_PASSWORD:-codevia}@postgres:5432/${POSTGRES_DB:-codevia_crm}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@codevia.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-codevia123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
