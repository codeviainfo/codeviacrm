name: Deploy CRM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/codevia/codeviacrm
            git pull origin main
            cd /opt/codevia/deploy
            make rebuild-crm
            # Limpieza post-deploy (solo restos sin uso; no toca contenedores,
            # imágenes en uso ni volúmenes como la BD del CRM):
            # - imágenes "dangling" (capas viejas que deja cada rebuild)
            # - caché de build por encima de 1GB (se conserva ese margen para
            #   que los rebuilds sigan siendo rápidos)
            docker image prune -f
            docker builder prune -f --keep-storage=1GB
